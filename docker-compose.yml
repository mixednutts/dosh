services:
  dosh:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dosh
    restart: unless-stopped
    volumes:
      - dosh-data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/dosh.db}
      - TZ=${TZ:-Australia/Sydney}
    ports:
      - "3080:80"

volumes:
  dosh-data:
