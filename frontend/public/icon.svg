<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: dark green circle like AU $100 note -->
  <circle cx="32" cy="32" r="32" fill="#14532d"/>

  <!-- Stacked note shapes (three rolled notes, offset) -->
  <!-- Back note: gold/yellow ($50) -->
  <rect x="10" y="20" width="44" height="26" rx="4" fill="#ca8a04" opacity="0.85"/>
  <!-- Middle note: teal/green ($100) -->
  <rect x="12" y="18" width="40" height="26" rx="4" fill="#166534"/>
  <!-- Front note: bright green -->
  <rect x="14" y="16" width="36" height="26" rx="4" fill="#16a34a"/>

  <!-- Dollar sign on front note -->
  <text x="32" y="36" text-anchor="middle" font-size="18" font-weight="900"
        font-family="Arial, sans-serif" fill="#f0fdf4" letter-spacing="-1">$</text>

  <!-- Subtle shine line on front note -->
  <line x1="18" y1="19" x2="46" y2="19" stroke="#4ade80" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
