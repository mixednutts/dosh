name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          pytest --cov=app --cov-report=xml:coverage.xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Check Sonar config presence
        run: |
          [ -n "${{ secrets.SONAR_TOKEN }}" ] && echo "SONAR_TOKEN present" || (echo "SONAR_TOKEN missing" && exit 1)
          [ -n "${{ vars.SONAR_HOST_URL }}" ] && echo "SONAR_HOST_URL present" || (echo "SONAR_HOST_URL missing" && exit 1)
          [ -n "${{ vars.SONAR_PROJECT_KEY }}" ] && echo "SONAR_PROJECT_KEY present" || (echo "SONAR_PROJECT_KEY missing" && exit 1)

      - name: SonarQube Scan
        id: sonarqube_scan
        uses: SonarSource/sonarqube-scan-action@26c51824c8330b026f261a3205f94958d4b1bc5c
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            --define sonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            --define sonar.organization=mixednutts
            --define sonar.qualitygate.wait=true
            --define sonar.qualitygate.timeout=300

      - name: Export sanitized SonarQube report
        if: ${{ always() }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from collections import Counter, defaultdict
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          sonar_host = os.environ["SONAR_HOST_URL"].rstrip("/")
          token = os.environ["SONAR_TOKEN"]
          project_key = os.environ["SONAR_PROJECT_KEY"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          head_ref = os.environ.get("GITHUB_HEAD_REF", "")
          branch = head_ref if event_name == "pull_request" and head_ref else ref_name

          def api_get(path, params):
              query = urllib.parse.urlencode(params)
              url = f"{sonar_host}{path}?{query}"
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Bearer {token}")
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  print(f"Sonar API request failed: {url}", file=sys.stderr)
                  print(body, file=sys.stderr)
                  raise

          def sanitize_issue(issue):
              return {
                  "key": issue.get("key"),
                  "type": issue.get("type"),
                  "severity": issue.get("severity"),
                  "rule": issue.get("rule"),
                  "message": issue.get("message"),
                  "component": issue.get("component"),
                  "line": issue.get("line"),
                  "status": issue.get("status"),
                  "effort": issue.get("effort"),
                  "debt": issue.get("debt"),
                  "tags": issue.get("tags", []),
                  "cleanCodeAttribute": issue.get("cleanCodeAttribute"),
                  "impacts": issue.get("impacts", []),
              }

          def component_path(component):
              if not component:
                  return "unknown"
              return component.split(":", 1)[1] if ":" in component else component

          def top_counts(counter, limit=20):
              return [
                  {"name": name, "count": count}
                  for name, count in counter.most_common(limit)
              ]

          def as_float(value):
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return 0.0

          def measure_value(measure):
              if "value" in measure:
                  return measure.get("value")
              periods = measure.get("periods") or []
              if periods:
                  return periods[0].get("value")
              return None

          branch_params = {"branch": branch} if branch else {}

          measures = api_get(
              "/api/measures/component",
              {
                  "component": project_key,
                  "metricKeys": ",".join(
                      [
                          "alert_status",
                          "bugs",
                          "vulnerabilities",
                          "code_smells",
                          "coverage",
                          "duplicated_lines_density",
                          "ncloc",
                          "reliability_rating",
                          "security_rating",
                          "sqale_rating",
                      ]
                  ),
                  **branch_params,
              },
          )

          quality_gate = api_get(
              "/api/qualitygates/project_status",
              {
                  "projectKey": project_key,
                  **branch_params,
              },
          )

          component_metric_keys = [
              "new_coverage",
              "coverage",
              "new_duplicated_lines_density",
              "new_duplicated_lines",
              "duplicated_lines_density",
              "duplicated_lines",
              "new_lines",
              "ncloc",
          ]
          component_page_size = 500
          component_page = 1
          file_metric_hotspots = []

          while True:
              component_page_data = api_get(
                  "/api/measures/component_tree",
                  {
                      "component": project_key,
                      "metricKeys": ",".join(component_metric_keys),
                      "additionalFields": "metrics",
                      "qualifiers": "FIL",
                      "strategy": "leaves",
                      "ps": str(component_page_size),
                      "p": str(component_page),
                      **branch_params,
                  },
              )

              components = component_page_data.get("components", [])
              for component in components:
                  file_path = component.get("path") or component.get("name") or component.get("key")
                  component_measures = {
                      item["metric"]: measure_value(item)
                      for item in component.get("measures", [])
                  }
                  new_dup_density = component_measures.get("new_duplicated_lines_density")
                  new_dup_lines = component_measures.get("new_duplicated_lines")
                  new_coverage = component_measures.get("new_coverage")
                  if (
                      new_dup_density in (None, "0", "0.0")
                      and new_dup_lines in (None, "0", "0.0")
                      and new_coverage in (None, "100", "100.0")
                  ):
                      continue
                  file_metric_hotspots.append(
                      {
                          "file": file_path,
                          "newCoverage": new_coverage,
                          "coverage": component_measures.get("coverage"),
                          "newDuplicatedLinesDensity": new_dup_density,
                          "newDuplicatedLines": new_dup_lines,
                          "duplicatedLinesDensity": component_measures.get("duplicated_lines_density"),
                          "duplicatedLines": component_measures.get("duplicated_lines"),
                          "newLines": component_measures.get("new_lines"),
                          "ncloc": component_measures.get("ncloc"),
                      }
                  )

              paging = component_page_data.get("paging", {})
              page_index = paging.get("pageIndex", component_page)
              page_size = paging.get("pageSize", component_page_size)
              total = paging.get("total", 0)

              if page_index * page_size >= total or not components:
                  break

              component_page += 1

          file_metric_hotspots.sort(
              key=lambda item: (
                  -as_float(item.get("newDuplicatedLinesDensity")),
                  -as_float(item.get("newDuplicatedLines")),
                  as_float(item.get("newCoverage")),
                  item.get("file") or "",
              )
          )

          quality_gate_conditions = quality_gate.get("projectStatus", {}).get("conditions", [])
          failing_quality_gate_conditions = [
              {
                  "metricKey": condition.get("metricKey"),
                  "comparator": condition.get("comparator"),
                  "errorThreshold": condition.get("errorThreshold"),
                  "actualValue": condition.get("actualValue"),
                  "status": condition.get("status"),
              }
              for condition in quality_gate_conditions
              if condition.get("status") == "ERROR"
          ]

          failed_measure_keys = {
              condition["metricKey"]
              for condition in failing_quality_gate_conditions
              if condition.get("metricKey")
          }

          file_metric_hotspots_by_metric = {}
          if "new_duplicated_lines_density" in failed_measure_keys or "new_duplicated_lines" in failed_measure_keys:
              duplication_hotspots = [
                  item
                  for item in file_metric_hotspots
                  if as_float(item.get("newDuplicatedLinesDensity")) > 0 or as_float(item.get("newDuplicatedLines")) > 0
              ]
              duplication_hotspots.sort(
                  key=lambda item: (
                      -as_float(item.get("newDuplicatedLinesDensity")),
                      -as_float(item.get("newDuplicatedLines")),
                      item.get("file") or "",
                  )
              )
              file_metric_hotspots_by_metric["new_duplicated_lines_density"] = duplication_hotspots[:25]
              file_metric_hotspots_by_metric["new_duplicated_lines"] = duplication_hotspots[:25]

          if "new_coverage" in failed_measure_keys:
              coverage_hotspots = [
                  item
                  for item in file_metric_hotspots
                  if item.get("newCoverage") not in (None, "")
              ]
              coverage_hotspots.sort(
                  key=lambda item: (
                      as_float(item.get("newCoverage")),
                      -as_float(item.get("newLines")),
                      item.get("file") or "",
                  )
              )
              file_metric_hotspots_by_metric["new_coverage"] = coverage_hotspots[:25]

          issue_page_size = 500
          issue_page = 1
          all_issues = []
          issue_total = None

          while True:
              issues_page = api_get(
                  "/api/issues/search",
                  {
                      "componentKeys": project_key,
                      "resolved": "false",
                      "ps": str(issue_page_size),
                      "p": str(issue_page),
                      "additionalFields": "_all",
                      **branch_params,
                  },
              )

              page_issues = issues_page.get("issues", [])
              if issue_total is None:
                  issue_total = issues_page.get("total", 0)
              all_issues.extend(page_issues)

              paging = issues_page.get("paging", {})
              page_index = paging.get("pageIndex", issue_page)
              page_size = paging.get("pageSize", issue_page_size)
              total = paging.get("total", issue_total or 0)

              if page_index * page_size >= total or not page_issues:
                  break

              issue_page += 1

          measure_map = {
              item["metric"]: item.get("value")
              for item in measures.get("component", {}).get("measures", [])
          }

          sanitized_issues = [sanitize_issue(issue) for issue in all_issues]

          by_severity = Counter(issue.get("severity", "UNKNOWN") for issue in sanitized_issues)
          by_type = Counter(issue.get("type", "UNKNOWN") for issue in sanitized_issues)
          by_rule = Counter(issue.get("rule", "unknown") for issue in sanitized_issues)
          by_file = Counter(component_path(issue.get("component")) for issue in sanitized_issues)
          by_directory = Counter()
          issues_by_rule = defaultdict(list)
          issues_by_file = defaultdict(list)

          for issue in sanitized_issues:
              file_path = component_path(issue.get("component"))
              directory = file_path.rsplit("/", 1)[0] if "/" in file_path else "."
              by_directory[directory] += 1
              issues_by_rule[issue.get("rule", "unknown")].append(issue)
              issues_by_file[file_path].append(issue)

          highest_priority_severities = {"BLOCKER": 0, "CRITICAL": 1, "MAJOR": 2, "MINOR": 3, "INFO": 4}

          high_leverage_rules = []
          for rule_name, issues_for_rule in by_rule.most_common(15):
              sample_issue = issues_by_rule[rule_name][0]
              high_leverage_rules.append(
                  {
                      "rule": rule_name,
                      "count": issues_for_rule,
                      "type": sample_issue.get("type"),
                      "severity": sample_issue.get("severity"),
                      "sampleComponent": component_path(sample_issue.get("component")),
                      "sampleLine": sample_issue.get("line"),
                      "sampleMessage": sample_issue.get("message"),
                  }
              )

          high_leverage_files = []
          for file_name, file_count in by_file.most_common(15):
              file_issues = issues_by_file[file_name]
              severity_counts = Counter(issue.get("severity", "UNKNOWN") for issue in file_issues)
              type_counts = Counter(issue.get("type", "UNKNOWN") for issue in file_issues)
              top_rules = Counter(issue.get("rule", "unknown") for issue in file_issues).most_common(5)
              highest_severity = min(
                  (highest_priority_severities.get(severity, 99) for severity in severity_counts),
                  default=99,
              )
              highest_severity_name = next(
                  (
                      severity
                      for severity, rank in highest_priority_severities.items()
                      if rank == highest_severity
                  ),
                  "UNKNOWN",
              )
              high_leverage_files.append(
                  {
                      "file": file_name,
                      "count": file_count,
                      "highestSeverity": highest_severity_name,
                      "severityCounts": dict(severity_counts),
                      "typeCounts": dict(type_counts),
                      "topRules": [
                          {"rule": rule_name, "count": rule_count}
                          for rule_name, rule_count in top_rules
                      ],
                  }
              )

          summary = {
              "projectKey": project_key,
              "branch": branch,
              "qualityGateStatus": quality_gate.get("projectStatus", {}).get("status"),
              "qualityGateConditions": quality_gate_conditions,
              "failingQualityGateConditions": failing_quality_gate_conditions,
              "measures": measure_map,
              "issueTotal": len(sanitized_issues),
              "issueCounts": {
                  "bySeverity": dict(by_severity),
                  "byType": dict(by_type),
                  "topRules": top_counts(by_rule, limit=25),
                  "topFiles": top_counts(by_file, limit=25),
                  "topDirectories": top_counts(by_directory, limit=25),
              },
              "highLeverageCandidates": {
                  "rules": high_leverage_rules,
                  "files": high_leverage_files,
              },
              "fileMetricHotspotsByMetric": file_metric_hotspots_by_metric,
          }

          report = {
              "projectKey": project_key,
              "branch": branch,
              "qualityGateStatus": quality_gate.get("projectStatus", {}).get("status"),
              "qualityGateConditions": quality_gate_conditions,
              "failingQualityGateConditions": failing_quality_gate_conditions,
              "measures": measure_map,
              "issueTotal": len(sanitized_issues),
              "issues": sanitized_issues,
          }

          with open("sonar-summary.json", "w", encoding="utf-8") as fh:
              json.dump(report, fh, indent=2)

          with open("sonar-issues-full.json", "w", encoding="utf-8") as fh:
              json.dump(report, fh, indent=2)

          with open("sonar-issues-summary.json", "w", encoding="utf-8") as fh:
              json.dump(summary, fh, indent=2)

          with open("sonar-component-metrics.json", "w", encoding="utf-8") as fh:
              json.dump(
                  {
                      "projectKey": project_key,
                      "branch": branch,
                      "metricKeys": component_metric_keys,
                      "failingQualityGateConditions": failing_quality_gate_conditions,
                      "fileMetricHotspots": file_metric_hotspots,
                      "fileMetricHotspotsByMetric": file_metric_hotspots_by_metric,
                  },
                  fh,
                  indent=2,
              )

          lines = [
              f"# SonarQube Summary for {project_key}",
              "",
              f"- Branch: `{branch}`" if branch else "- Branch: `(default)`",
              f"- Quality Gate: `{report['qualityGateStatus']}`",
              f"- Bugs: `{measure_map.get('bugs', 'n/a')}`",
              f"- Vulnerabilities: `{measure_map.get('vulnerabilities', 'n/a')}`",
              f"- Code Smells: `{measure_map.get('code_smells', 'n/a')}`",
              f"- Coverage: `{measure_map.get('coverage', 'n/a')}`",
              f"- Duplicated Lines %: `{measure_map.get('duplicated_lines_density', 'n/a')}`",
              f"- LOC: `{measure_map.get('ncloc', 'n/a')}`",
              f"- Open Issues Exported: `{len(sanitized_issues)}`",
              "",
              "## Failed Quality Gate Conditions",
              "",
          ]

          if failing_quality_gate_conditions:
              for condition in failing_quality_gate_conditions:
                  lines.append(
                      f"- `{condition.get('metricKey', 'unknown')}`: status `{condition.get('status', 'UNKNOWN')}`, "
                      f"actual `{condition.get('actualValue', 'n/a')}`, threshold `{condition.get('errorThreshold', 'n/a')}`"
                  )
          else:
              lines.append("- No failing quality gate conditions were returned by the Sonar API.")

          lines.extend(
              [
                  "",
              "## Issue Counts",
              "",
              ]
          )

          severity_order = ["BLOCKER", "CRITICAL", "MAJOR", "MINOR", "INFO", "UNKNOWN"]
          for severity in severity_order:
              if severity in by_severity:
                  lines.append(f"- {severity}: `{by_severity[severity]}`")

          lines.extend(
              [
                  "",
                  "## Top Rule Clusters",
                  "",
              ]
          )

          for entry in high_leverage_rules[:10]:
              sample_location = entry["sampleComponent"]
              if entry.get("sampleLine"):
                  sample_location = f"{sample_location}:{entry['sampleLine']}"
              lines.append(
                  f"- `{entry['rule']}`: `{entry['count']}` issues "
                  f"({entry.get('severity', 'UNKNOWN')} {entry.get('type', 'ISSUE')}); "
                  f"sample at `{sample_location}`: {entry.get('sampleMessage', '').strip()}"
              )

          lines.extend(
              [
                  "",
                  "## Top File Clusters",
                  "",
              ]
          )

          for entry in high_leverage_files[:10]:
              top_rules_text = ", ".join(
                  f"{rule_entry['rule']} ({rule_entry['count']})"
                  for rule_entry in entry.get("topRules", [])[:3]
              )
              lines.append(
                  f"- `{entry['file']}`: `{entry['count']}` issues; highest severity "
                  f"`{entry['highestSeverity']}`; top rules: {top_rules_text or 'n/a'}"
              )

          lines.extend(
              [
                  "",
                  "## New Code Duplication Hotspots",
                  "",
              ]
          )

          duplication_hotspots = file_metric_hotspots_by_metric.get("new_duplicated_lines_density", [])
          if duplication_hotspots:
              for component in duplication_hotspots[:10]:
                  lines.append(
                      f"- `{component['file']}`: "
                      f"`{component.get('newDuplicatedLinesDensity', 'n/a')}%` duplicated lines on new code "
                      f"(`{component.get('newDuplicatedLines', 'n/a')}` lines)"
                  )
          else:
              lines.append("- No file-level new code duplication hotspots were returned by the Sonar API.")

          lines.extend(
              [
                  "",
                  "## New Code Coverage Hotspots",
                  "",
              ]
          )

          coverage_hotspots = file_metric_hotspots_by_metric.get("new_coverage", [])
          if coverage_hotspots:
              for component in coverage_hotspots[:10]:
                  lines.append(
                      f"- `{component['file']}`: "
                      f"`{component.get('newCoverage', 'n/a')}%` coverage on new code "
                      f"across `{component.get('newLines', 'n/a')}` new lines"
                  )
          else:
              lines.append("- No file-level new code coverage hotspots were returned by the Sonar API.")

          lines.extend(
              [
                  "",
                  "## Issue Sample",
                  "",
              ]
          )

          if sanitized_issues:
              for issue in sanitized_issues[:25]:
                  component = issue.get("component") or "unknown"
                  line = issue.get("line")
                  location = f"{component}:{line}" if line else component
                  lines.append(
                      f"- [{issue.get('severity', 'UNKNOWN')}] "
                      f"{issue.get('type', 'ISSUE')} "
                      f"`{issue.get('rule', 'unknown')}` at `{location}`: "
                      f"{issue.get('message', '').strip()}"
                  )
          else:
              lines.append("- No open issues returned by the Sonar API.")

          with open("sonar-summary.md", "w", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
          PY

      - name: Upload sanitized SonarQube report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sonar-summary-${{ github.run_id }}
          path: |
            sonar-component-metrics.json
            sonar-summary.json
            sonar-issues-full.json
            sonar-issues-summary.json
            sonar-summary.md
          if-no-files-found: error

      - name: Fail workflow when SonarQube scan or quality gate fails
        if: ${{ steps.sonarqube_scan.outcome != 'success' }}
        run: |
          echo "SonarQube scan completed, but the scan step failed or the quality gate did not pass."
          exit 1
