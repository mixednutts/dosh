name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          pytest --cov=app --cov-report=xml:coverage.xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Check Sonar config presence
        run: |
          [ -n "${{ secrets.SONAR_TOKEN }}" ] && echo "SONAR_TOKEN present" || (echo "SONAR_TOKEN missing" && exit 1)
          [ -n "${{ vars.SONAR_HOST_URL }}" ] && echo "SONAR_HOST_URL present" || (echo "SONAR_HOST_URL missing" && exit 1)
          [ -n "${{ vars.SONAR_PROJECT_KEY }}" ] && echo "SONAR_PROJECT_KEY present" || (echo "SONAR_PROJECT_KEY missing" && exit 1)

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@26c51824c8330b026f261a3205f94958d4b1bc5c
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            --define sonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            --define sonar.organization=mixednutts
