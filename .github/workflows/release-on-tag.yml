name: Publish Release From Tag

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to publish or republish, for example v0.1.3-alpha
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tagged release state
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          tag_sha="$(git rev-list -n 1 "$TAG_NAME")"
          python scripts/release_management.py validate --ref "$tag_sha" --expect-tag "$TAG_NAME" --require-release-entry

      - name: Render release body
        id: body
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          tag_sha="$(git rev-list -n 1 "$TAG_NAME")"
          version="${TAG_NAME#v}"
          python scripts/release_management.py release-body --ref "$tag_sha" --version "$version" > "$RUNNER_TEMP/release-body.md"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "body_path=$RUNNER_TEMP/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        env:
          BODY_PATH: ${{ steps.body.outputs.body_path }}
          VERSION: ${{ steps.body.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.BODY_PATH, 'utf8');
            const version = process.env.VERSION;
            const tag = `v${version}`;
            const prerelease = version.includes('-');

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease,
            };

            if (release) {
              await github.rest.repos.updateRelease({
                ...payload,
                release_id: release.data.id,
              });
              core.info(`Updated GitHub Release for ${tag}.`);
            } else {
              await github.rest.repos.createRelease(payload);
              core.info(`Created GitHub Release for ${tag}.`);
            }

      # Disabled until Docker publishing is ready to be fully automated.
      # Remove `if: false` to enable automatic Docker builds on every tag release.
      - name: Trigger Docker publish workflow
        if: false
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-docker-image.yml',
              ref: context.ref,
              inputs: {
                tag_name: context.ref.replace('refs/tags/', ''),
                push_latest: 'true'
              }
            });
