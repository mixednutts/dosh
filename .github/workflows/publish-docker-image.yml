name: Publish Docker Image to GHCR

on:
  # Phase 1: Manual trigger from existing release tag
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build and publish (e.g., v0.6.6-alpha)"
        required: true
        type: string
      push_latest:
        description: "Also push as latest tag"
        required: false
        type: boolean
        default: false

  # Phase 2: Automated on tag push (enable later by uncommenting)
  # push:
  #   tags:
  #     - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python (for version validation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate version touchpoints at target
        run: |
          TARGET_SHA=$(git rev-list -n 1 "${{ github.event.inputs.tag_name || github.ref_name }}")
          python scripts/release_management.py validate --ref "$TARGET_SHA"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            ${{ (github.event.inputs.push_latest == 'true') && 'type=raw,value=latest' || '' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            DEV_MODE=false

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        continue-on-error: true
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
